<!DOCTYPE html>
<html>
<head>
  <title>Cheeky Comment App</title>

  <!-- 1950s government typewriter font -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      background: #e7e5df; /* aged paper / office wall */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* keep button fixed at top area */
      height: 100vh;
      margin: 0;
      padding-top: 80px; /* keeps button in place */
    }

    /* 1950s government red warning button */
    #cheekyBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 6px solid #5a0000;
      background: radial-gradient(circle, #ff4d4d 0%, #cc0000 70%);
      box-shadow:
        0 10px #5a0000,
        0 16px 25px rgba(0,0,0,0.4);
      font-family: "Special Elite", monospace;
      font-size: 32px;
      font-weight: bold;
      color: white;
      text-align: center;
      line-height: 1.1; /* tighter spacing for 3 lines */
      padding-top: 40px; /* centres the 3-line text vertically */
      cursor: pointer;
      transition: all 0.1s ease-in-out;
      white-space: pre-line; /* allows line breaks */
    }

    #cheekyBtn:active {
      box-shadow: 0 5px #5a0000;
      transform: translateY(5px);
    }

    /* Plain text output below button, lower on screen */
    #output {
      display: none;
      margin-top: 80px; /* moved further down */
      font-family: "Special Elite", monospace;
      font-size: 20px;
      color: #1a1a1a;
      text-align: center;
    }
  </style>
</head>

<body>
  <button id="cheekyBtn">Do
Not
Press</button>

  <p id="output"></p>

  <script src="script.js"></script>
</body>
</html>
