<!DOCTYPE html>
<html>
<head>
  <title>Cheeky Comment App</title>

  <style>
    body {
      background: #f4f1e8; /* parchment-like */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    /* Victorian retro round button in post-box red */
    #cheekyBtn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 6px solid #7a0000; /* darker red rim */
      background: radial-gradient(circle, #ff4d4d 0%, #cc0000 70%); /* post box red */
      box-shadow: 0 8px #7a0000, 0 12px 20px rgba(0,0,0,0.3);
      font-size: 36px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: all 0.1s ease-in-out;
    }

    #cheekyBtn:active {
      box-shadow: 0 4px #7a0000;
      transform: translateY(4px);
    }

    /* Hidden until first click */
    #output {
      display: none;
      margin-top: 30px;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      color: #2b2b2b;
      max-width: 400px;
      text-align: center;
      padding: 10px;
      background: #ffffffd0;
      border: 1px solid #c8c2b8;
      border-radius: 4px;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <button id="cheekyBtn">PRESS</button>
  <p id="output"></p>

  <script src="script.js"></script>
</body>
</html>
