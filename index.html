<!DOCTYPE html>
<html>
<head>
  <title>Cheeky Comment App</title>

  <!-- 1950s government typewriter font -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      background: #e7e5df;
      margin: 0;
      height: 100vh;

      /* Button stays near the top, never moves */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      padding-top: 80px; /* fixed top spacing */
    }

    #cheekyBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 6px solid #5a0000;
      background: radial-gradient(circle, #ff4d4d 0%, #cc0000 70%);
      box-shadow:
        0 10px #5a0000,
        0 16px 25px rgba(0,0,0,0.4);

      font-family: "Special Elite", monospace;
      font-size: 32px;
      font-weight: bold;
      color: white;

      /* Multi-line text */
      white-space: pre-line;
      text-align: center;

      /* Perfect centring of the 3-line text */
      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;
      transition: all 0.1s ease-in-out;
    }

    #cheekyBtn:active {
      box-shadow: 0 5px #5a0000;
      transform: translateY(5px);
    }

    #output {
      display: none;
      margin-top: 100px; /* lower text, but does NOT move the button */
      font-family: "Special Elite", monospace;
      font-size: 20px;
      color: #1a1a1a;
      text-align: center;
    }
  </style>
</head>

<body>

  <button id="cheekyBtn">Do
Not
Press</button>

  <p id="output"></p>

  <script src="script.js"></script>
</body>
</html>
