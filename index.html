<!DOCTYPE html>
<html>
<head>
  <title>Cheeky Comment App</title>

  <!-- Victorian / Steampunk font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #f4f1e8; /* parchment-like */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    /* Steampunk brass button */
    #cheekyBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 10px solid #5a3b1e; /* dark brass rim */
      background: radial-gradient(circle, #d4a76a 0%, #8b5e34 70%); /* brass gradient */
      box-shadow:
        0 12px #5a3b1e,
        0 18px 30px rgba(0,0,0,0.4),
        inset 0 0 20px rgba(255,255,255,0.3);
      font-family: "Cinzel Decorative", serif;
      font-size: 24px;
      font-weight: 700;
      color: #2b1a0f;
      text-shadow: 1px 1px 2px #f7e7c6;
      cursor: pointer;
      text-align: center;
      line-height: 1.2;
      padding: 10px;
      transition: all 0.1s ease-in-out;
    }

    #cheekyBtn:active {
      box-shadow: 0 6px #5a3b1e;
      transform: translateY(6px);
    }

    /* Output box */
    #output {
      display: none;
      margin-top: 30px;
      font-family: "Courier New", Courier, monospace;
      font-size: 16px;
      color: #2b2b2b;
