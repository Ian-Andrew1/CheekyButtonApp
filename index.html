<!DOCTYPE html>
<html>
<head>
  <title>Cheeky Comment App</title>

  <style>
    body {
      background: #f4f1e8; /* parchment-like */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    /* Victorian retro round button */
    #cheekyBtn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 6px solid #3b2f2f;
      background: radial-gradient(circle, #d4b48c 0%, #a67c52 70%);
      box-shadow: 0 8px #3b2f2f, 0 12px 20px rgba(0,0,0,0.3);
      font-size: 18px;
      font-weight: bold;
      color: #3b2f2f;
      cursor: pointer;
      transition: all 0.1s ease-in-out;
    }

    #cheekyBtn:active {
      box-shadow: 0 4px #3b2f2f;
      transform: translateY(4px);
    }

    /* Typewriter text */
    #output {
      margin-top: 30px;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      color: #2b2b2b;
      max-width: 400px;
      text-align: center;
      padding: 10px;
      background: #ffffffd0;
      border: 1px solid #c8c2b8;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <button id="cheekyBtn">PRESS</button>
  <p id="output"></p>

  <script src="script.js"></script>
</body>
</html>
